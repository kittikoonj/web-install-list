services:
  mariadb:
    image: mariadb:11
    container_name: install-list-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: install_list
      MARIADB_USER: installlist
      MARIADB_PASSWORD: installlist
    ports:
      - '3306:3306'
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./api/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    container_name: install-list-api
    restart: unless-stopped
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USERNAME: installlist
      DB_PASSWORD: installlist
      DB_DATABASE: install_list
      SESSION_SECRET: docker-dev-secret
      PORT: 3000
      CORS_ORIGIN: http://localhost:8080
    ports:
      - '3000:3000'
    volumes:
      - api_uploads:/app/uploads
    depends_on:
      mariadb:
        condition: service_healthy

  web:
    build: ./web
    container_name: install-list-web
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      - api

volumes:
  mariadb_data:
  api_uploads:
