<div class="page-header">
  <h1>Audit Log</h1>
</div>

<div class="search-bar">
  <input type="date" [(ngModel)]="filters.from" />
  <input type="date" [(ngModel)]="filters.to" />
  <select [(ngModel)]="filters.action">
    <option value="">ทุก action</option>
    <option value="create">create</option>
    <option value="update">update</option>
    <option value="delete">delete</option>
  </select>
  <input type="text" placeholder="โดย user..." [(ngModel)]="filters.performedBy" />
  <button class="btn btn-primary" (click)="load()">Filter</button>
  <button class="btn" (click)="clearFilters()">Clear</button>
</div>

<div class="card table-wrap">
  <table class="data-table">
    <thead>
      <tr>
        <th>วันที่-เวลา</th>
        <th>Action</th>
        <th>Object</th>
        <th>ชื่อ</th>
        <th>โดย</th>
      </tr>
    </thead>
    <tbody>
      @for (log of logs(); track log.id) {
        <tr>
          <td>{{ log.performedAt | date:'dd/MM/yyyy HH:mm:ss' }}</td>
          <td>
            <span class="badge action-{{ log.action }}">
              {{ actionLabels[log.action] || log.action }}
            </span>
          </td>
          <td>{{ log.objectType }}</td>
          <td>{{ log.objectName }}</td>
          <td>{{ log.performedBy }}</td>
        </tr>
      } @empty {
        <tr><td colspan="5" class="empty-state">ไม่มี audit log</td></tr>
      }
    </tbody>
  </table>
</div>
